<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
<title>FIFA World Cup 2026 — Live Tracker</title>
<meta name="description" content="Interactive FIFA World Cup 2026 results tracker. Track all 104 matches, group standings and knockout bracket in real time.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');
:root{
  --bg:#eef1f6;--surface:#fff;--sur2:#f5f7fa;
  --border:#d0d7e8;--bord2:#b8c4d8;
  --text:#1a2340;--dim:#7a85a0;
  --hdr:#1a2c5e;--gold:#b8860b;--goldlt:#f5c842;
  --green:#137333;--greenbg:#e6f4ea;
  --bronze:#a0522d;--radius:7px;
  --sh:0 2px 8px rgba(26,44,94,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;min-height:100vh;overflow-x:auto}

/* ── HEADER ── */
.hdr{
  background:linear-gradient(135deg,#0d1b3e 0%,#1a2c5e 50%,#0d1b3e 100%);
  border-bottom:3px solid var(--goldlt);padding:12px 24px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;box-shadow:0 2px 14px rgba(0,0,0,.3);
  flex-wrap:wrap;gap:8px;
}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-brand h1{
  font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;
  letter-spacing:2px;color:var(--goldlt);text-transform:uppercase;
}
.hdr-brand h1 span{color:#c8d5f0;font-weight:400}
.live-pill{
  background:#e50000;color:#fff;font-size:9px;font-weight:800;
  padding:2px 7px;border-radius:10px;letter-spacing:1.5px;
  animation:livePulse 2s infinite;
}
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:.5}}
.hdr-stats{
  display:flex;gap:14px;flex-wrap:wrap;
}
.hdr-stat{
  font-family:'Barlow Condensed',sans-serif;font-size:12px;
  color:rgba(255,255,255,.65);display:flex;align-items:center;gap:4px;
}
.hdr-stat strong{color:#fff;font-size:14px}
.btn{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);
  color:#e8edf5;padding:6px 14px;border-radius:var(--radius);
  cursor:pointer;font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;
  letter-spacing:.3px;transition:all .15s;
}
.btn:hover{background:rgba(255,255,255,.22);border-color:var(--goldlt);color:var(--goldlt)}
.btn-gold{background:var(--goldlt);color:#1a2c5e;border-color:var(--goldlt);font-weight:700}
.btn-gold:hover{background:#e6b800}

/* ── TOGGLE BAR ── */
.toggle-bar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:8px 24px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  position:sticky;top:56px;z-index:100;
}
.tab-btn{
  background:transparent;border:1px solid var(--border);
  color:var(--hdr);padding:6px 16px;border-radius:6px;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;transition:all .15s;
}
.tab-btn.active{background:var(--hdr);color:#fff;border-color:var(--hdr)}
.tab-btn:hover:not(.active){background:#eef1f7;border-color:var(--bord2)}
.global-stats{margin-left:auto;display:flex;gap:14px;font-size:11px;color:var(--dim)}
.global-stats strong{color:var(--hdr);font-family:'Barlow Condensed',sans-serif;font-size:13px}

/* ── CHAMPIONS PANEL ── */
.champs{
  display:flex;gap:10px;padding:10px 24px;
  background:linear-gradient(90deg,#fffbef,#fff8e0,#fffbef);
  border-bottom:1px solid #e8d88a;flex-wrap:wrap;
}
.champ-box{
  display:flex;align-items:center;gap:8px;padding:6px 14px;
  border-radius:var(--radius);border:2px solid rgba(255,255,255,.3);
  background:var(--surface);position:relative;overflow:hidden;
  min-width:140px;
}
.champ-box .cb-flag{
  position:absolute;inset:0;background-size:100% 100%;
  background-position:center;opacity:1;
}
.champ-box .cb-overlay{position:absolute;inset:0;background:rgba(0,0,0,.42)}
.champ-box .cb-content{position:relative;z-index:1;display:flex;align-items:center;gap:7px}
.champ-emoji{font-size:17px}
.champ-lbl{color:rgba(255,255,255,.75);font-size:9px;text-transform:uppercase;letter-spacing:.8px}
.champ-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:900;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.7)}

/* ── GROUP STAGE ── */
.group-stage-panel{padding:16px 24px 24px;display:none}
.group-stage-panel.open{display:block}
.gs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px}
.gs-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--sh)}
.gs-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:900;letter-spacing:1px;font-size:15px}
.gs-card-hdr .grp-status{font-size:10px;background:rgba(255,255,255,.2);padding:2px 8px;border-radius:8px;font-weight:600;letter-spacing:.5px}
.gs-matches{padding:8px;border-bottom:1px solid var(--border);background:#fff}
.gs-match{display:grid;grid-template-columns:1fr 30px 10px 30px 1fr;gap:3px;align-items:center;padding:5px 3px;border-bottom:1px solid #f0f2f5}
.gs-match:last-child{border-bottom:none}
.gs-match.played{background:#fafffe}
.gs-match .gs-team-name{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px}
.gs-match .gs-team-name.left{justify-content:flex-end;text-align:right}
.gs-match .gs-team-name.right{justify-content:flex-start}
.gs-team-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.gs-vs{text-align:center;font-size:9px;color:var(--dim);font-weight:600}
.gs-score-in{
  width:28px;height:24px;border:1px solid var(--border);border-radius:4px;
  background:#fff;color:var(--hdr);font-family:'Barlow Condensed',sans-serif;
  font-size:15px;font-weight:800;text-align:center;outline:none;
  transition:all .15s;-moz-appearance:textfield;padding:0;
}
.gs-score-in::-webkit-inner-spin-button,.gs-score-in::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.gs-score-in:focus{border-color:var(--goldlt);background:rgba(245,200,66,.08);box-shadow:0 0 0 2px rgba(245,200,66,.2)}
.gs-score-in::placeholder{color:#c0c8d8;font-size:10px}
.gs-standings{padding:8px 10px 10px;background:#fff}
.gs-standings-hdr{font-size:9px;color:var(--dim);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.auto-pill{background:#e8f0fe;color:#1a73e8;padding:1px 6px;border-radius:8px;font-size:8px;font-weight:700}
table.gs-table{width:100%;border-collapse:collapse;font-family:'Barlow Condensed',sans-serif;font-size:11px}
.gs-table th{background:#eef1f6;color:var(--dim);font-weight:700;font-size:9px;letter-spacing:.5px;text-transform:uppercase;padding:3px 4px;text-align:center;border-bottom:1px solid var(--border)}
.gs-table th.tc{text-align:left;padding-left:7px}
.gs-table td{padding:4px;text-align:center;border-bottom:1px solid #f5f7fa;font-weight:600}
.gs-table td.tc{text-align:left;padding-left:5px;font-weight:700;display:flex;align-items:center;gap:5px}
.gs-table .pts{font-weight:900;color:var(--hdr);font-size:13px}
.gs-table tr.p1{background:linear-gradient(90deg,#e6f4ea,transparent 70%)}
.gs-table tr.p2{background:linear-gradient(90deg,#e8f0fe,transparent 70%)}
.gs-table tr.p3{background:linear-gradient(90deg,#fef7e0,transparent 70%)}
.gs-table tr.p4{opacity:.5}
.pos-badge{display:inline-flex;width:14px;height:14px;border-radius:50%;align-items:center;justify-content:center;font-size:8px;font-weight:900;color:#fff;flex-shrink:0}
tr.p1 .pos-badge{background:#137333}
tr.p2 .pos-badge{background:#1967d2}
tr.p3 .pos-badge{background:#b8860b}
tr.p4 .pos-badge{background:#9aa0a6}
.dg-pos{color:#137333}
.dg-neg{color:#c5221f}
.flag-mini{width:18px;height:12px;object-fit:cover;border-radius:2px;flex-shrink:0}

/* ── BRACKET ── */
.bracket-outer{padding:18px 20px 48px;position:relative;z-index:10;overflow-x:auto;display:none}
.bracket-outer.open{display:block}
#bracket-wrap{position:relative;display:inline-block;min-width:1280px}
#connector-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
#matches-layer{position:relative;z-index:2;display:flex;gap:0;align-items:flex-start}

/* round columns */
.round-col{display:flex;flex-direction:column;position:relative}
.round-col.r32{width:152px}.round-col.r16{width:145px}
.round-col.qf{width:138px}.round-col.sf{width:130px}
.centre-col{width:144px;flex-shrink:0}
.conn-gap{width:20px;flex-shrink:0}
.round-lbl{
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);text-align:center;
  padding:3px 0 5px;border-bottom:2px solid var(--bord2);height:28px;
  display:flex;align-items:flex-end;justify-content:center;
}
.round-lbl.gold{color:var(--gold);border-bottom-color:var(--gold);font-size:13px}
.pts-tag{
  display:inline-block;background:rgba(26,44,94,.12);color:var(--hdr);
  font-family:'Barlow',sans-serif;font-size:8px;font-weight:800;
  padding:1px 5px;border-radius:3px;margin-left:5px;vertical-align:middle;
  letter-spacing:.3px;
}

/* match cards */
.match-wrap{padding:3px 4px}
.match{display:flex;flex-direction:column;position:relative}
.match-meta{display:flex;justify-content:space-between;padding:0 2px 2px;min-height:13px}
.match-date{font-size:9px;color:var(--dim);font-style:italic}
.match-id{font-size:9px;color:#9ba8c0;font-weight:600}
.match-teams{
  border:1px solid var(--bord2);border-radius:var(--radius);overflow:hidden;
  background:var(--sur2);box-shadow:0 2px 10px rgba(26,44,94,.15);transition:box-shadow .15s;
}
.match-teams:hover{box-shadow:0 4px 18px rgba(26,44,94,.22)}
.match.final .match-teams{border-color:var(--gold);border-width:2px;box-shadow:0 0 18px rgba(184,134,11,.22)}
.match.third .match-teams{border-color:var(--bronze);border-width:2px}

/* team rows — flag proportioned (3:2) */
.team-row{
  display:flex;align-items:stretch;height:80px;
  border-bottom:1px solid rgba(255,255,255,.2);
  position:relative;overflow:hidden;transition:background .12s;
}
.team-row:last-child{border-bottom:none}
.team-row.drag-over{outline:2px dashed var(--goldlt);outline-offset:-2px}
.grp-stripe{width:4px;min-width:4px;flex-shrink:0;z-index:1;position:relative}
.win-btn{
  width:22px;min-width:22px;height:22px;margin:auto 3px auto 4px;
  border-radius:50%;border:1px solid rgba(255,255,255,.5);
  background:rgba(0,0,0,.30);cursor:pointer;display:flex;
  align-items:center;justify-content:center;font-size:10px;color:#fff;
  flex-shrink:0;transition:all .15s;line-height:1;padding:0;
  position:relative;z-index:1;
}
.win-btn:hover{border-color:var(--goldlt);background:rgba(245,200,66,.4)}
.win-btn:disabled{opacity:.2;cursor:default}
.team-name{
  flex:1;padding:4px;
  font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;
  letter-spacing:.5px;text-transform:uppercase;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  align-self:center;transition:color .12s;position:relative;z-index:1;
}
.team-name.has-team{cursor:grab;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.8)}
.team-name.has-team:active{cursor:grabbing}
.team-name.empty{
  font-style:italic;font-size:10px;color:rgba(200,210,220,.7);
  font-weight:500;text-transform:none;letter-spacing:0;
}
.team-name.dragging-src{opacity:.3}
.clr-btn{
  width:14px;min-width:14px;height:14px;margin:auto 3px auto 0;
  border-radius:50%;border:1px solid rgba(255,255,255,.4);
  background:rgba(0,0,0,.25);cursor:pointer;font-size:8px;
  color:rgba(255,255,255,.8);display:none;align-items:center;
  justify-content:center;line-height:1;transition:all .12s;
  flex-shrink:0;padding:0;position:relative;z-index:1;
}
.clr-btn:hover{background:rgba(220,50,50,.7);border-color:#f99;color:#fff}
.team-row:hover .clr-btn.vis{display:flex}
.score-box{
  width:36px;min-width:36px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,.40);border-left:1px solid rgba(255,255,255,.15);
  flex-shrink:0;gap:1px;padding:3px 0;position:relative;z-index:1;
}
.score-input{
  width:28px;height:26px;background:transparent;border:none;color:#fff;
  font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;
  text-align:center;outline:none;cursor:pointer;-moz-appearance:textfield;padding:0;
  text-shadow:0 1px 4px rgba(0,0,0,.9);
}
.score-input::-webkit-inner-spin-button,.score-input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.score-input:focus{background:rgba(245,200,66,.25);border-radius:3px}
.score-input::placeholder{color:rgba(255,255,255,.3);font-size:11px}
.score-input.pens-in{width:22px;height:17px;color:#ffd580;font-size:11px;font-weight:700;display:none;background:rgba(160,82,45,.2);border-radius:2px}
.score-input.pens-in:focus{background:rgba(160,82,45,.35)}
.score-input.pens-in::placeholder{color:rgba(255,200,100,.4);font-size:8px}
.pens-paren{display:none;color:#ffd580;font-size:11px;font-weight:700;line-height:1}
.match-teams.show-pens .score-input.pens-in,
.match-teams.show-pens .pens-paren{display:inline-flex;align-items:center}
.match.has-pens::before{
  content:'⚽ PENALES';position:absolute;top:-1px;right:2px;
  background:var(--bronze);color:#fff;font-family:'Barlow',sans-serif;
  font-size:8px;font-weight:700;letter-spacing:1px;padding:2px 7px;
  border-radius:3px 3px 0 0;z-index:6;animation:penPulse .4s ease-out;
  pointer-events:none;line-height:1;
}
.match.has-pens .match-id{visibility:hidden}
.match.final.has-pens,.match.third.has-pens{padding-top:8px}
@keyframes penPulse{from{transform:translateY(4px);opacity:0}to{transform:translateY(0);opacity:1}}
.third-lbl{
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;color:var(--bronze);text-align:center;
  padding:4px 0 5px;border-bottom:2px solid #ddb59a;margin-bottom:0;
  margin-top:20px;height:26px;display:flex;align-items:flex-end;justify-content:center;
}

/* undo toast */
#undoBar{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:#1a2c5e;color:#e8edf5;border:1px solid var(--goldlt);
  padding:9px 18px;border-radius:8px;display:flex;align-items:center;gap:12px;
  font-size:12px;font-weight:500;box-shadow:0 4px 20px rgba(26,44,94,.3);
  z-index:1000;opacity:0;pointer-events:none;transition:opacity .25s;
}
#undoBar.show{opacity:1;pointer-events:all}
#undoBar button{background:var(--goldlt);color:#1a2c5e;border:none;padding:3px 11px;border-radius:5px;font-weight:700;cursor:pointer;font-size:12px}

/* watermark */
.wm{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:480px;height:480px;opacity:.04;pointer-events:none;z-index:0;user-select:none}

/* ── MOBILE / iOS RESPONSIVE ── */
@media (max-width: 768px) {
  .hdr{padding:8px 14px}
  .hdr-brand h1{font-size:14px;letter-spacing:1px}
  .hdr-stats{display:none}
  .toggle-bar{padding:6px 14px;top:50px}
  .tab-btn{font-size:11px;padding:5px 12px}
  .global-stats{font-size:10px;display:none}
  .gs-grid{grid-template-columns:1fr}
  .gs-match{grid-template-columns:1fr 28px 10px 28px 1fr}
  /* bracket: allow horizontal scroll with touch */
  .bracket-outer{padding:10px 0 30px;overflow-x:scroll;-webkit-overflow-scrolling:touch}
  #bracket-wrap{min-width:1200px}
  .champs{padding:7px 14px;gap:7px}
  .champ-box{min-width:110px;padding:5px 10px}
  .champ-name{font-size:12px}
}
@media (max-width: 480px) {
  .hdr-brand h1{font-size:13px}
  .live-pill{display:none}
  .gs-card-hdr{font-size:13px}
  .gs-match .gs-team-name{font-size:11px}
  .flag-mini{width:15px;height:10px}
}
</style>
</head>
<body>

<svg class="wm" viewBox="0 0 400 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="170" y="330" width="60" height="14" rx="4" fill="#1a2c5e"/>
  <rect x="150" y="344" width="100" height="12" rx="4" fill="#1a2c5e"/>
  <rect x="188" y="280" width="24" height="52" rx="3" fill="#1a2c5e"/>
  <ellipse cx="200" cy="200" rx="80" ry="88" fill="#1a2c5e"/>
  <ellipse cx="178" cy="160" rx="20" ry="36" fill="#2a3c6e" opacity=".6"/>
  <path d="M120 170 Q88 170 88 210 Q88 245 120 248" stroke="#1a2c5e" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M280 170 Q312 170 312 210 Q312 245 280 248" stroke="#1a2c5e" stroke-width="18" fill="none" stroke-linecap="round"/>
  <text x="200" y="410" font-family="Arial Black" font-size="68" font-weight="900" fill="#1a2c5e" text-anchor="middle">26</text>
  <text x="200" y="95" font-family="Arial" font-size="22" fill="#1a2c5e" text-anchor="middle" letter-spacing="8">★ ★ ★</text>
  <text x="200" y="130" font-family="Arial Black" font-size="16" font-weight="900" fill="#1a2c5e" text-anchor="middle" letter-spacing="4">FIFA</text>
  <text x="200" y="152" font-family="Arial" font-size="11" fill="#1a2c5e" text-anchor="middle" letter-spacing="2">WORLD CUP</text>
</svg>

<header class="hdr">
  <div class="hdr-brand">
    <h1>FIFA World Cup 2026 <span>— Live Tracker</span></h1>
    <span class="live-pill">LIVE</span>
  </div>
  <div class="hdr-stats" id="hdrStats"></div>
  <div style="display:flex;gap:8px">
    <button class="btn" onclick="resetAll()">↺ Reset</button>
    <button class="btn btn-gold" onclick="saveAll()">💾 Save</button>
  </div>
</header>

<div class="toggle-bar">
  <button class="tab-btn" id="btnGroups" onclick="showView('groups')">⚽ Fase de Grupos</button>
  <button class="tab-btn active" id="btnBracket" onclick="showView('bracket')">🏆 Bracket Eliminatorio</button>
  <div class="global-stats" id="globalStats"></div>
</div>

<div class="champs" id="championsPanel" style="display:none"></div>

<div class="group-stage-panel" id="groupPanel">
  <div class="gs-grid" id="groupGrid"></div>
</div>

<div class="bracket-outer open" id="bracketOuter">
  <div id="bracket-wrap">
    <svg id="connector-svg"></svg>
    <div id="matches-layer"></div>
  </div>
</div>

<div id="undoBar">
  <span id="undoMsg">Cambio realizado</span>
  <button onclick="doUndo()">↩ Deshacer</button>
</div>

<script>

// ── Safe storage wrapper (localStorage blocked on iOS file://) ──
const Store = (()=>{
  let _mem = {};
  try {
    localStorage.setItem('__test__','1');
    localStorage.removeItem('__test__');
    return {
      get: k => { try{ return localStorage.getItem(k); }catch(e){ return _mem[k]||null; } },
      set: (k,v) => { try{ localStorage.setItem(k,v); }catch(e){ _mem[k]=v; } },
      del: k => { try{ localStorage.removeItem(k); }catch(e){ delete _mem[k]; } }
    };
  } catch(e) {
    return {
      get: k => _mem[k]||null,
      set: (k,v) => { _mem[k]=v; },
      del: k => { delete _mem[k]; }
    };
  }
})();

// ════════════════════════════════════════════════════
// FLAG SYSTEM
// ════════════════════════════════════════════════════
const FLAG_CODES = {
  'Mexico':'mx','S. Korea':'kr','Czech Rep.':'cz','South Africa':'za',
  'Canada':'ca','Switzerland':'ch','Bosnia & H.':'ba','Qatar':'qa',
  'Brazil':'br','Morocco':'ma','Scotland':'gb-sct','Haiti':'ht',
  'USA':'us','Türkiye':'tr','Paraguay':'py','Australia':'au',
  'Germany':'de',"C. d'Ivoire":'ci','Ecuador':'ec','Curaçao':'cw',

function getGS(g,i,s){return STATE.groupScores?.[g]?.[i]?.[s]??''}

  if(!STATE.groupScores)STATE.groupScores={};
  if(!STATE.groupScores[g])STATE.groupScores[g]={};
  if(!STATE.groupScores[g][i])STATE.groupScores[g][i]={};
  STATE.groupScores[g][i][s]=v;
  Store.set(SK_KEY,JSON.stringify(STATE));
  updateStandings(g);
  rebuildR32();cascadeAll();
  renderBracket();updateGlobalStats();updateChampions();
}
function calcStandings(g){
  const G=GROUPS[g];
  const st={};
  ['1','2','3','4'].forEach((p,idx)=>{st[p]={pos:p,name:G[p],ord:idx,played:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0}});
  GM_PAIRS.forEach(([h,a],i)=>{
    const sh=getGS(g,i,'h'),sa=getGS(g,i,'a');
    if(sh===''||sa===''||sh==null||sa==null)return;
    const gh=+sh,ga=+sa;if(isNaN(gh)||isNaN(ga))return;
    st[h].played++;st[a].played++;st[h].gf+=gh;st[h].ga+=ga;st[a].gf+=ga;st[a].ga+=gh;
    if(gh>ga){st[h].w++;st[h].pts+=3;st[a].l++;}
    else if(ga>gh){st[a].w++;st[a].pts+=3;st[h].l++;}
    else{st[h].d++;st[h].pts++;st[a].d++;st[a].pts++;}
  });
  Object.values(st).forEach(s=>s.gd=s.gf-s.ga);
  return Object.values(st).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.ord-b.ord);
}
function getEffective(g){
  const any=GM_PAIRS.some((_,i)=>{const sh=getGS(g,i,'h'),sa=getGS(g,i,'a');return(sh!==''&&sh!=null)||(sa!==''&&sa!=null)});
  if(!any)return['','','',''];
  return calcStandings(g).map(t=>t.name);
}
function rebuildR32(){
  R32_SCHEDULE.forEach((m,i)=>{
    const side=i<8?'L':'R',idx=i<8?i:i-8;
    const r1=getEffective(m.g1),r2=getEffective(m.g2);
    setSlot('r32',side,idx,{t1:r1[+m.p1-1]||'',t2:r2[+m.p2-1]||'',id:m.id,date:m.date,time:m.time});
  });
}

function getMatchResult(mk,t1,t2){
  if(!t1||!t2)return{decided:false};
  const sc=STATE.scores[mk]||{};
  const s1=sc.t1,s2=sc.t2;
  if(s1===''||s1==null||s2===''||s2==null)return{decided:false};
  const n1=+s1,n2=+s2;if(isNaN(n1)||isNaN(n2))return{decided:false};
  if(n1>n2)return{decided:true,winner:t1,loser:t2,score:`${n1}–${n2}`};
  if(n2>n1)return{decided:true,winner:t2,loser:t1,score:`${n2}–${n1}`};
  const p1=sc.t1p,p2=sc.t2p;
  if(!p1||!p2)return{decided:false,tie:true,score:`${n1}–${n2}`};
  const np1=+p1,np2=+p2;if(isNaN(np1)||isNaN(np2))return{decided:false,tie:true};
  if(np1>np2)return{decided:true,winner:t1,loser:t2,score:`${n1}–${n2}`,pens:`${np1}–${np2}`};
  if(np2>np1)return{decided:true,winner:t2,loser:t1,score:`${n2}–${n1}`,pens:`${np2}–${np1}`};
  return{decided:false,tie:true,penaltyTie:true};
}
function findSlot(mk){
  for(let i=0;i<R32_SCHEDULE.length;i++){
    if(R32_SCHEDULE[i].id===mk)return{round:'r32',side:i<8?'L':'R',idx:i<8?i:i-8};
  }
  const p=mk.split('_');if(p.length===3)return{round:p[0],side:p[1],idx:+p[2]};
  return null;
}
function updateNext(r,s,i,winner,loser){
  if(r==='sf'){
    const fs=s==='L'?1:2;
    if(fs===1){setSlot('fin','C',0,{t1:winner||''});if(loser)setSlot('3rd','C',0,{t1:loser});}
    else{setSlot('fin','C',0,{t2:winner||''});if(loser)setSlot('3rd','C',0,{t2:loser});}
  } else {
    const NX={r32:'r16',r16:'qf',qf:'sf'};const nr=NX[r];if(!nr)return;
    const ni=Math.floor(i/2),ns=i%2===0?1:2;
    if(ns===1)setSlot(nr,s,ni,{t1:winner||''});else setSlot(nr,s,ni,{t2:winner||''});
  }
}
function cascadeAll(){
  const ROUNDS=['r32','r16','qf','sf'];
  const COUNTS={r32:8,r16:4,qf:2,sf:1};
  for(const r of ROUNDS){
    for(const s of['L','R']){
      for(let i=0;i<COUNTS[r];i++){
        const sl=getSlot(r,s,i);
        const mk=r==='r32'?R32_SCHEDULE[s==='L'?i:i+8].id:SK(r,s,i);
        const res=getMatchResult(mk,sl.t1,sl.t2);
        if(res.decided)updateNext(r,s,i,res.winner,res.loser);
      }
    }
  }
}
function setScore(mk,sk,v){
  if(!STATE.scores[mk])STATE.scores[mk]={};
  STATE.scores[mk][sk]=v;
  Store.set(SK_KEY,JSON.stringify(STATE));
  const loc=findSlot(mk);
  if(loc){
    const sl=getSlot(loc.round,loc.side,loc.idx);
    const res=getMatchResult(mk,sl.t1,sl.t2);
    const el=document.getElementById(`mt_${loc.round}_${loc.side}_${loc.idx}`);
    if(el){
      el.classList.toggle('show-pens',!!res.tie);
      // Also toggle parent .match for iOS (no :has() support)
      const matchEl=el.closest('.match');
      if(matchEl)matchEl.classList.toggle('has-pens',!!res.tie);
    }
    if(['r32','r16','qf','sf'].includes(loc.round)){
      updateNext(loc.round,loc.side,loc.idx,res.decided?res.winner:null,res.decided?res.loser:null);
      requestAnimationFrame(renderBracket);
    }
  }
  updateChampions();updateGlobalStats();
}

let dragTeam=null;
function onDragStart(e,t){if(!t){e.preventDefault();return}dragTeam=t;e.dataTransfer.effectAllowed='copy';e.dataTransfer.setData('text/plain',t);setTimeout(()=>document.querySelectorAll(`[data-team="${t}"]`).forEach(el=>el.classList.add('dragging-src')),0)}
function onDragEnd(){document.querySelectorAll('.dragging-src').forEach(el=>el.classList.remove('dragging-src'))}
function onDragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over')}
function onDragLeave(e){e.currentTarget.classList.remove('drag-over')}
function onDrop(e,r,s,i,slot){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  const team=e.dataTransfer.getData('text/plain')||dragTeam;
  if(!team)return;
  const snap=JSON.parse(JSON.stringify(STATE.slots));
  pushUndo(`Colocaste ${team}`,()=>{STATE.slots=snap;renderBracket()});
  if(slot===1)setSlot(r,s,i,{t1:team});else setSlot(r,s,i,{t2:team});
  Store.set(SK_KEY,JSON.stringify(STATE));renderBracket();
}
function clearSlot(r,s,i,slot){
  const sl=getSlot(r,s,i);const removed=slot===1?sl.t1:sl.t2;if(!removed)return;
  const snap=JSON.parse(JSON.stringify(STATE.slots));
  pushUndo(`Quitaste ${removed}`,()=>{STATE.slots=snap;renderBracket()});
  if(slot===1)setSlot(r,s,i,{t1:''});else setSlot(r,s,i,{t2:''});
  Store.set(SK_KEY,JSON.stringify(STATE));renderBracket();
}
function advanceWinner(r,s,i,team){
  if(!team)return;
  const snap=JSON.parse(JSON.stringify(STATE.slots));
  const sl=getSlot(r,s,i);const loser=team===sl.t1?sl.t2:sl.t1;
  updateNext(r,s,i,team,loser);
  pushUndo(`Avanzaste ${team}`,()=>{STATE.slots=snap;renderBracket();updateChampions()});
  Store.set(SK_KEY,JSON.stringify(STATE));renderBracket();updateChampions();
}

// ── placeholder labels for empty slots ──
function phLabel(r,s,i,slot){
  if(r==='r32'){const lin=s==='L'?i:i+8;const m=R32_SCHEDULE[lin];return{text:`${m?.[`p${slot}`]}° ${m?.[`g${slot}`]}`,color:GC[m?.[`g${slot}`]]||'#9ba8c0'};}
  if(r==='r16'){const r32i=i*2+(slot-1);const lin=s==='L'?r32i:r32i+8;return{text:`Gan. ${R32_SCHEDULE[lin]?.id||'?'}`,color:'#8a96b0'};}
  const KOQ={L:['M89','M90','M93','M94'],R:['M91','M92','M95','M96']};
  const KOS={L:['M97','M98'],R:['M99','M100']};
  if(r==='qf')return{text:`Gan. ${KOQ[s]?.[i*2+(slot-1)]||'?'}`,color:'#8a96b0'};
  if(r==='sf')return{text:`Gan. ${KOS[s]?.[slot-1]||'?'}`,color:'#8a96b0'};
  if(r==='fin')return{text:slot===1?'Gan. M101':'Gan. M102',color:'#b8860b'};
  if(r==='3rd')return{text:slot===1?'Perd. M101':'Perd. M102',color:'#a0522d'};
  return{text:'TBD',color:'#9ba8c0'};
}

// ── render one team row ──
function renderTeamRow(r,s,i,slot,team,mk){
  const has=!!team;
  const ph=!has?phLabel(r,s,i,slot):null;
  const color=has?(GC[TEAM_GROUP[team]]||'#888'):ph?.color||'#c8d0e0';
  const sv=(STATE.scores[mk]||{})[`t${slot}`]??'';
  const pv=(STATE.scores[mk]||{})[`t${slot}p`]??'';
  const disp=has?team:(ph?.text||'TBD');

  let rowStyle='';
  const overlay=has&&FLAG_CODES[team]
    ?`<div style="position:absolute;inset:0;background:rgba(0,0,0,0.35);pointer-events:none;z-index:0"></div>`
    :'';

  if(has&&FLAG_CODES[team]){
    rowStyle=`background-image:url('https://flagcdn.com/w320/${FLAG_CODES[team]}.png');background-size:100% 100%;position:relative;`;
  } else if(has&&FLAG_FB[team]){
    rowStyle=`background:${FLAG_FB[team]};position:relative;`;
  }

  return `<div class="team-row" style="${rowStyle}"
    ondragover="onDragOver(event)" ondragleave="onDragLeave(event)"
    ondrop="onDrop(event,'${r}','${s}',${i},${slot})">
    ${overlay}
    <div class="grp-stripe" style="background:${color};opacity:${has?.9:.3};z-index:1;position:relative"></div>
    <button class="win-btn" onclick="advanceWinner('${r}','${s}',${i},'${team||''}')" ${!has?'disabled':''} title="Marcar ganador" style="position:relative;z-index:1">⊙</button>
    <div class="team-name ${has?'has-team':'empty'}" style="${has?'':'color:rgba(180,195,210,.8)'};position:relative;z-index:1"
      data-team="${team||''}" draggable="${has}"
      ondragstart="onDragStart(event,'${team||''}')" ondragend="onDragEnd()"
      title="${has?'Arrastra para avanzar':'Pendiente: '+(ph?.text||'')}">
      ${disp}
    </div>
    <button class="clr-btn ${has?'vis':''}" onclick="clearSlot('${r}','${s}',${i},${slot})" title="Quitar" style="position:relative;z-index:1">✕</button>
    <div class="score-box">
      <input class="score-input" type="number" min="0" max="30"
        value="${sv}" placeholder="–"
        onchange="setScore('${mk}','t${slot}',this.value)" onclick="this.select()" inputmode="numeric"/>
      <span class="pens-paren">(</span>
      <input class="score-input pens-in" type="number" min="0" max="30"
        value="${pv}" placeholder="–" title="Penales"
        onchange="setScore('${mk}','t${slot}p',this.value)" onclick="this.select()" inputmode="numeric"/>
      <span class="pens-paren">)</span>
    </div>
  </div>`;
}

// ── render one match ──
function renderMatch(r,s,i,opts={}){
  const{isFin=false,is3rd=false,showMeta=true}=opts;
  const sl=getSlot(r,s,i);
  const{t1='',t2='',id='',date='',time:tm=''}=sl;
  const mk=id||SK(r,s,i);
  const res=getMatchResult(mk,t1,t2);
  const showPens=!!res.tie||(STATE.scores[mk]&&(STATE.scores[mk].t1p||STATE.scores[mk].t2p));
  return `<div class="match-wrap" data-rnd="${r}" data-side="${s}" data-idx="${i}">
    <div class="match ${isFin?'final':''} ${is3rd?'third':''}">
      ${showMeta&&(date||id)?`<div class="match-meta">
        <span class="match-date">${date}${tm?' · '+tm:''}</span>
        <span class="match-id">${id}</span>
      </div>`:'<div style="height:4px"></div>'}
      <div class="match-teams ${showPens?'show-pens':''}" id="mt_${r}_${s}_${i}">
        ${renderTeamRow(r,s,i,1,t1,mk)}
        ${renderTeamRow(r,s,i,2,t2,mk)}
      </div>
    </div>
  </div>`;
}

// ── build column ──
const MATCH_H=190;
function spacer(px){return `<div style="height:${px}px"></div>`}
function buildCol(rnd,side,count){
  let html='';
  const top={r32:0,r16:MATCH_H/2,qf:MATCH_H*1.5+MATCH_H/2,sf:MATCH_H*3.5-MATCH_H/2}[rnd]||0;
  const gap={r32:0,r16:MATCH_H,qf:MATCH_H*3,sf:0}[rnd]||0;
  if(rnd==='sf'){html+=spacer(Math.round(top))+renderMatch(rnd,side,0,{showMeta:false});}
  else{for(let i=0;i<count;i++){if(i===0)html+=spacer(Math.round(top));html+=renderMatch(rnd,side,i,{showMeta:rnd==='r32'});if(i<count-1)html+=spacer(gap);}}
  return html;
}
function col(cls,lbl,content){return `<div class="round-col ${cls}"><div class="round-lbl">${lbl}</div>${content}</div>`}
function gap(){return `<div class="conn-gap"></div>`}

function renderBracket(){
  const ml=document.getElementById('matches-layer');
  const FINAL_TOP=Math.round(MATCH_H*3.5-MATCH_H/2);
  ml.innerHTML=
    col('r32','Round of 32',buildCol('r32','L',8))+gap()+
    col('r16','Round of 16',buildCol('r16','L',4))+gap()+
    col('qf','Cuartos',buildCol('qf','L',2))+gap()+
    col('sf','Semifinal',buildCol('sf','L',1))+gap()+
    `<div class="centre-col">
      <div class="round-lbl gold">🏆 Final · Jul 19</div>
      <div style="height:${FINAL_TOP}px"></div>
      ${renderMatch('fin','C',0,{isFin:true,showMeta:false})}
      <div class="third-lbl">🥉 3er Lugar · Jul 18</div>
      ${renderMatch('3rd','C',0,{is3rd:true,showMeta:false})}
    </div>`+gap()+
    col('sf','Semifinal',buildCol('sf','R',1))+gap()+
    col('qf','Cuartos',buildCol('qf','R',2))+gap()+
    col('r16','Round of 16',buildCol('r16','R',4))+gap()+
    col('r32','Round of 32',buildCol('r32','R',8));
  requestAnimationFrame(()=>requestAnimationFrame(drawConnectors));
  updateChampions();
}

// ── SVG connectors ──
function getRect(r,s,i){
  const el=document.getElementById(`mt_${r}_${s}_${i}`);if(!el)return null;
  const wr=document.getElementById('bracket-wrap').getBoundingClientRect();
  const er=el.getBoundingClientRect();
  return{left:er.left-wr.left,right:er.right-wr.left,top:er.top-wr.top,bottom:er.bottom-wr.top,mid:(er.top+er.bottom)/2-wr.top};
}
function drawConnectors(){
  const svg=document.getElementById('connector-svg');
  const wrap=document.getElementById('bracket-wrap');
  if(!svg||!wrap)return;
  svg.setAttribute('viewBox',`0 0 ${wrap.offsetWidth} ${wrap.offsetHeight}`);
  svg.innerHTML='';
  const CC='#4472c4',CW='2',OP='.5';
  function pth(d){const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',d);p.setAttribute('stroke',CC);p.setAttribute('stroke-width',CW);p.setAttribute('fill','none');p.setAttribute('opacity',OP);svg.appendChild(p);}
  function connL(fr,to,cnt){for(let i=0;i<cnt;i++){const a=getRect(fr,'L',i*2),b=getRect(fr,'L',i*2+1),c=getRect(to,'L',i);if(!a||!b||!c)continue;const xA=a.right+1,xC=c.left-1,mx=(xA+xC)/2;pth(`M${xA} ${a.mid} H${mx} V${b.mid} M${xA} ${b.mid} H${mx} M${mx} ${a.mid} V${c.mid} H${xC}`);}}
  function connR(fr,to,cnt){for(let i=0;i<cnt;i++){const a=getRect(fr,'R',i*2),b=getRect(fr,'R',i*2+1),c=getRect(to,'R',i);if(!a||!b||!c)continue;const xA=a.left-1,xC=c.right+1,mx=(xA+xC)/2;pth(`M${xA} ${a.mid} H${mx} V${b.mid} M${xA} ${b.mid} H${mx} M${mx} ${a.mid} V${c.mid} H${xC}`);}}
  connL('r32','r16',4);connL('r16','qf',2);connL('qf','sf',1);
  connR('r32','r16',4);connR('r16','qf',2);connR('qf','sf',1);
  const sfL=getRect('sf','L',0),sfR=getRect('sf','R',0),fin=getRect('fin','C',0),trd=getRect('3rd','C',0);
  if(sfL&&fin){const mx=(sfL.right+fin.left)/2;pth(`M${sfL.right+1} ${sfL.mid} H${mx} V${fin.mid} H${fin.left-1}`);}
  if(sfR&&fin){const mx=(sfR.left+fin.right)/2;pth(`M${sfR.left-1} ${sfR.mid} H${mx} V${fin.mid} H${fin.right+1}`);}
  if(sfL&&trd){const l=document.createElementNS('http://www.w3.org/2000/svg','line');l.setAttribute('x1',sfL.right+1);l.setAttribute('y1',sfL.mid);l.setAttribute('x2',trd.left-1);l.setAttribute('y2',trd.mid);l.setAttribute('stroke','#a0522d');l.setAttribute('stroke-width','1.5');l.setAttribute('stroke-dasharray','5,4');l.setAttribute('opacity','.4');svg.appendChild(l);}
  if(sfR&&trd){const l=document.createElementNS('http://www.w3.org/2000/svg','line');l.setAttribute('x1',sfR.left-1);l.setAttribute('y1',sfR.mid);l.setAttribute('x2',trd.right+1);l.setAttribute('y2',trd.mid);l.setAttribute('stroke','#a0522d');l.setAttribute('stroke-width','1.5');l.setAttribute('stroke-dasharray','5,4');l.setAttribute('opacity','.4');svg.appendChild(l);}
}
window.addEventListener('resize',()=>requestAnimationFrame(drawConnectors));

// ── Champions ──
function updateChampions(){
  const panel=document.getElementById('championsPanel');
  const fin=getSlot('fin','C',0);const thd=getSlot('3rd','C',0);
  if(!fin.t1&&!fin.t2&&!thd.t1&&!thd.t2){panel.style.display='none';return;}
  panel.style.display='flex';
  const finRes=getMatchResult('fin_C_0',fin.t1,fin.t2);
  const thdRes=getMatchResult('3rd_C_0',thd.t1,thd.t2);
  const fmtScore=r=>r.pens?`${r.score} (pen. ${r.pens})`:r.score||'';
  const box=(emoji,lbl,name,note='')=>{
    if(!name)return'';
    const code=FLAG_CODES[name];
    const flagStyle=code?`background-image:url('https://flagcdn.com/w320/${code}.png');background-size:100% 100%;`:(FLAG_FB[name]?`background:${FLAG_FB[name]};`:'');
    const overlay=code?'<div class="cb-overlay"></div>':'';
    return `<div class="champ-box" style="${flagStyle}border-color:rgba(255,255,255,.4)">
      ${code?`<div class="cb-flag" style="${flagStyle}"></div>`:''}
      ${overlay}
      <div class="cb-content">
        <span class="champ-emoji">${emoji}</span>
        <div><div class="champ-lbl">${lbl}${note?' · '+note:''}</div>
        <div class="champ-name">${name}</div></div>
      </div></div>`;
  };
  let html='';
  if(finRes.decided){html+=box('🏆','Campeón',finRes.winner,fmtScore(finRes));html+=box('🥈','Subcampeón',finRes.loser);}
  else if(finRes.tie){if(fin.t1)html+=box('⚽','Finalista (penales)',fin.t1,fmtScore(finRes));if(fin.t2)html+=box('⚽','Finalista (penales)',fin.t2);}
  else{if(fin.t1)html+=box('🥇','Finalista',fin.t1);if(fin.t2)html+=box('🥇','Finalista',fin.t2);}
  if(thdRes.decided){html+=box('🥉','3er Lugar',thdRes.winner,fmtScore(thdRes));html+=box('4️⃣','4to Lugar',thdRes.loser);}
  else{if(thd.t1)html+=box('🥉','Disputa 3er Lugar',thd.t1);if(thd.t2)html+=box('🥉','Disputa 3er Lugar',thd.t2);}
  panel.innerHTML=html;
}

// ── Global stats ──
function updateGlobalStats(){
  let gm=0,gk=0,goals=0;
  Object.keys(GROUPS).forEach(g=>GM_PAIRS.forEach((_,i)=>{
    const sh=getGS(g,i,'h'),sa=getGS(g,i,'a');
    if(sh!==''&&sh!=null&&sa!==''&&sa!=null&&!isNaN(+sh)&&!isNaN(+sa)){gm++;goals+=(+sh)+(+sa);}
  }));
  R32_SCHEDULE.forEach((m,i)=>{
    const side=i<8?'L':'R',idx=i<8?i:i-8;
    const sc=STATE.scores[m.id]||{};
    if(sc.t1!=null&&sc.t1!==''&&sc.t2!=null&&sc.t2!==''&&!isNaN(+sc.t1)&&!isNaN(+sc.t2)){gk++;goals+=(+sc.t1)+(+sc.t2);}
  });
  ['r16','qf','sf','fin','3rd'].forEach(r=>{
    ['L','R','C'].forEach(s=>{
      const cnt=r==='fin'||r==='3rd'?1:r==='sf'?1:r==='qf'?2:r==='r16'?4:0;
      for(let i=0;i<cnt;i++){
        const mk=SK(r,s,i);const sc=STATE.scores[mk]||{};
        if(sc.t1!=null&&sc.t1!==''&&sc.t2!=null&&sc.t2!==''&&!isNaN(+sc.t1)&&!isNaN(+sc.t2)){gk++;goals+=(+sc.t1)+(+sc.t2);}
      }
    });
  });
  const total=gm+gk,avg=total>0?(goals/total).toFixed(2):'0.00';
  const el=document.getElementById('globalStats');
  if(el)el.innerHTML=`⚽ <strong>${gm}</strong>/72 grupos &nbsp;·&nbsp; 🏆 <strong>${gk}</strong>/32 eliminación &nbsp;·&nbsp; 🎯 <strong>${goals}</strong> goles &nbsp;·&nbsp; 📊 <strong>${avg}</strong>/partido`;
  const hdr=document.getElementById('hdrStats');
  if(hdr)hdr.innerHTML=`<div class="hdr-stat">⚽ <strong>${gm+gk}</strong> partidos</div><div class="hdr-stat">🎯 <strong>${goals}</strong> goles</div><div class="hdr-stat">📊 <strong>${avg}</strong> x partido</div>`;
}

// ── View toggle ──
function showView(v){
  document.getElementById('btnGroups').classList.toggle('active',v==='groups');
  document.getElementById('btnBracket').classList.toggle('active',v==='bracket');
  document.getElementById('groupPanel').classList.toggle('open',v==='groups');
  document.getElementById('bracketOuter').classList.toggle('open',v==='bracket');
  if(v==='bracket')requestAnimationFrame(()=>requestAnimationFrame(drawConnectors));
}

// ── Reset ──
function resetAll(){
  if(!confirm('¿Resetear todos los resultados?'))return;
  Store.del(SK_KEY);
  STATE={slots:{},scores:{},groupScores:{}};UNDO_STACK=[];
  renderBracket();renderGroupStage();updateGlobalStats();
  document.getElementById('championsPanel').style.display='none';
}

// ── Touch-based drag & drop for iOS (no native HTML5 DnD) ──
(function(){
  let touchDragging=null, touchClone=null, touchTarget=null;
  function getTouchDrop(x,y){
    if(touchClone)touchClone.style.display='none';
    const el=document.elementFromPoint(x,y);
    if(touchClone)touchClone.style.display='';
    return el?el.closest('[ondrop]'):null;
  }
  document.addEventListener('touchstart',e=>{
    const src=e.target.closest('.team-name.has-team');
    if(!src)return;
    touchDragging=src.dataset.team;
    touchClone=src.cloneNode(true);
    touchClone.style.cssText='position:fixed;z-index:9999;opacity:.8;pointer-events:none;background:rgba(26,44,94,.9);color:#fff;padding:6px 12px;border-radius:6px;font-size:14px;font-weight:900;white-space:nowrap;font-family:Barlow Condensed,sans-serif;';
    document.body.appendChild(touchClone);
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!touchDragging||!touchClone)return;
    const t=e.touches[0];
    touchClone.style.left=(t.clientX-40)+'px';
    touchClone.style.top=(t.clientY-20)+'px';
    const drop=getTouchDrop(t.clientX,t.clientY);
    document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
    if(drop)drop.classList.add('drag-over');
    touchTarget=drop;
  },{passive:true});
  document.addEventListener('touchend',e=>{
    if(!touchDragging)return;
    if(touchClone){touchClone.remove();touchClone=null;}
    document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
    if(touchTarget){
      // Parse the ondrop attribute to get slot info
      const attr=touchTarget.getAttribute('ondrop');
      if(attr){
        const m=attr.match(/onDrop\(event,'(\w+)','(\w+)',(\d+),(\d+)\)/);
        if(m){
          const [,r,s,i,slot]=m;
          const snap=JSON.parse(JSON.stringify(STATE.slots));
          pushUndo('Colocaste '+touchDragging,()=>{STATE.slots=snap;renderBracket()});
          if(+slot===1)setSlot(r,s,+i,{t1:touchDragging});else setSlot(r,s,+i,{t2:touchDragging});
          Store.set(SK_KEY,JSON.stringify(STATE));renderBracket();
        }
      }
    }
    touchDragging=null;touchTarget=null;
  },{passive:true});
})();
