<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=0.5,minimum-scale=0.2,maximum-scale=4.0,user-scalable=yes">
<title>FIFA World Cup 2026 — Bracket</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');
:root{--bg:#eef1f6;--sur2:#f5f7fa;--bdr:#d0d7e8;--bdr2:#b8c4d8;--txt:#1a2340;--dim:#7a85a0;--hdr:#1a2c5e;--gold:#b8860b;--glt:#f5c842;--brz:#a0522d;--r:7px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:auto}
.hdr{background:linear-gradient(135deg,#0d1b3e,#1a2c5e,#0d1b3e);border-bottom:3px solid var(--glt);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 14px rgba(0,0,0,.3);flex-wrap:wrap;gap:8px}
.hdr h1{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;letter-spacing:2px;color:var(--glt);text-transform:uppercase}
.hdr h1 span{color:#c8d5f0;font-weight:400}
.pill{background:#e50000;color:#fff;font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px;letter-spacing:1.5px;animation:lp 2s infinite}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.4}}
.hst{display:flex;gap:14px}
.hst span{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:rgba(255,255,255,.65)}
.hst strong{color:#fff;font-size:14px}
.btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);color:#e8edf5;padding:6px 14px;border-radius:var(--r);cursor:pointer;font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;transition:all .15s}
.btn:hover{background:rgba(255,255,255,.22);border-color:var(--glt);color:var(--glt)}
.btng{background:var(--glt);color:#1a2c5e;border-color:var(--glt);font-weight:700}
.btng:hover{background:#e6b800}
.champs{display:flex;gap:10px;padding:10px 24px;background:linear-gradient(90deg,#fffbef,#fff8e0,#fffbef);border-bottom:1px solid #e8d88a;flex-wrap:wrap}
.cbox{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:var(--r);border:2px solid rgba(255,255,255,.3);position:relative;overflow:hidden;min-width:140px}
.cov{position:absolute;inset:0;background:rgba(0,0,0,.42)}
.cct{position:relative;z-index:1;display:flex;align-items:center;gap:7px}
.cem{font-size:17px}
.clb{color:rgba(255,255,255,.75);font-size:9px;text-transform:uppercase;letter-spacing:.8px}

.bo{padding:16px 20px 48px;overflow:auto;-webkit-overflow-scrolling:touch}
#bw{position:relative;display:inline-block;min-width:1360px;transform-origin:top left}
#sv{position:absolute;top:0;left:0;pointer-events:none;z-index:1}
#ml{position:relative;z-index:2;display:flex;align-items:flex-start}
.rc{display:flex;flex-direction:column}
.r32{width:152px}.r16{width:145px}.qf{width:138px}.sf{width:130px}.cc{width:144px;flex-shrink:0}
.cg{width:20px;flex-shrink:0}

.mw{padding:3px 4px}
.mc{display:flex;flex-direction:column;position:relative}
.mm{display:flex;justify-content:space-between;align-items:center;padding:0 4px 2px;min-height:13px}
.mdt{font-size:9px;color:var(--dim);font-style:italic}
.mte{font-size:9px;color:#1565c0;font-weight:800;margin-left:3px}
.mid{font-size:9px;color:#9ba8c0;font-weight:600}
.mts{border:1px solid var(--bdr2);border-radius:var(--r);overflow:hidden;background:var(--sur2);box-shadow:0 2px 10px rgba(26,44,94,.15);transition:box-shadow .15s}
.mts:hover{box-shadow:0 4px 18px rgba(26,44,94,.22)}
.mc.fin .mts{border-color:var(--glt);border-width:2px;box-shadow:0 0 18px rgba(184,134,11,.22)}
.mc.trd .mts{border-color:var(--brz);border-width:2px}
.vn{font-size:8px;color:rgba(255,255,255,.55);text-align:center;padding:2px 4px 3px;background:rgba(0,0,0,.28);line-height:1.4;border-top:1px solid rgba(255,255,255,.08)}

.tr{display:flex;align-items:stretch;height:80px;border-bottom:1px solid rgba(255,255,255,.2);position:relative;overflow:hidden}
.tr:last-child{border-bottom:none}
.tr.dov{outline:2px dashed var(--glt);outline-offset:-2px}
.gs{width:4px;min-width:4px;flex-shrink:0;z-index:1;position:relative}
.wb{width:22px;min-width:22px;height:22px;margin:auto 3px auto 4px;border-radius:50%;border:1px solid rgba(255,255,255,.5);background:rgba(0,0,0,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;flex-shrink:0;transition:all .15s;padding:0;position:relative;z-index:1}

.tn{flex:1;padding:4px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;align-self:center;position:relative;z-index:1}

.sb{width:36px;min-width:36px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.4);border-left:1px solid rgba(255,255,255,.15);flex-shrink:0;gap:1px;padding:3px 0;position:relative;z-index:1}

.si::-webkit-inner-spin-button,.si::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.si:focus{background:rgba(245,200,66,.25);border-radius:3px}
.si::placeholder{color:rgba(255,255,255,.3);font-size:11px}
.si.pi{width:22px;height:17px;color:#ffd580;font-size:11px;font-weight:700;display:none;background:rgba(160,82,45,.2);border-radius:2px}
.pp{display:none;color:#ffd580;font-size:11px;font-weight:700;line-height:1}
.mts.sp .si.pi,.mts.sp .pp{display:inline-flex;align-items:center}
.mc.hp::before{content:'⚽ PENALES';position:absolute;top:-1px;right:2px;background:var(--brz);color:#fff;font-family:'Barlow',sans-serif;font-size:8px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:3px 3px 0 0;z-index:6;animation:ppa .4s;pointer-events:none}
@keyframes ppa{from{transform:translateY(4px);opacity:0}to{transform:translateY(0);opacity:1}}
.mc.hp .mid{visibility:hidden}
.mc.fin.hp,.mc.trd.hp{padding-top:8px}
.tlbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--brz);text-align:center;padding:4px 0 5px;border-bottom:2px solid #ddb59a;margin:20px 0 0;height:26px;display:flex;align-items:flex-end;justify-content:center}
#ub{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a2c5e;color:#e8edf5;border:1px solid var(--glt);padding:9px 18px;border-radius:8px;display:flex;align-items:center;gap:12px;font-size:12px;box-shadow:0 4px 20px rgba(26,44,94,.3);z-index:1000;opacity:0;pointer-events:none;transition:opacity .25s}
#ub.on{opacity:1;pointer-events:all}
#ub button{background:var(--glt);color:#1a2c5e;border:none;padding:3px 11px;border-radius:5px;font-weight:700;cursor:pointer}
@media(max-width:768px){.hdr{padding:8px 14px}.hdr h1{font-size:14px}.hst{display:none}.bo{padding:10px 0 30px}#bw{min-width:1360px}}
/* Zoom controls for mobile */
#zc{display:none;position:fixed;bottom:24px;right:16px;z-index:500;flex-direction:column;gap:6px}
#zc button{width:44px;height:44px;border-radius:50%;background:#1a2c5e;color:#fff;border:2px solid var(--glt);font-size:22px;font-weight:900;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;line-height:1;padding:0;transition:background .15s}
#zc button:hover{background:#2a3c7e}
#zc .zr{font-size:11px;font-weight:700}
@media(max-width:900px){#zc{display:flex}}
</style>

<body>
<header class="hdr">
  <div style="display:flex;align-items:center;gap:12px">
    <h1>FIFA World Cup 2026 <span>— Bracket Eliminatorio</span></h1>
    <span class="pill">LIVE</span>
  </div>
  <div class="hst" id="hs"></div>
  <div style="display:flex;gap:8px">
    <button class="btn" onclick="doReset()">↺ Reset</button>
    <button class="btn btng" onclick="doSave()">💾 Save</button>
  </div>
</header>
<div class="champs" id="cp" style="display:none"></div>
<div class="bo"><div id="bw"><svg id="sv"></svg><div id="ml"></div></div></div>
<div id="zc">
  <button onclick="zIn()" title="Zoom in">＋</button>
  <button class="zr" onclick="zReset()" title="Zoom 100%">1:1</button>
  <button class="zr" onclick="zFit()" title="Ver bracket completo">⊡</button>
  <button onclick="zOut()" title="Zoom out">－</button>
</div>
<div id="ub"><span id="um">OK</span><button onclick="doUndo()">↩ Deshacer</button></div>
<script>
'use strict';
// ── Storage ──
const ST=(()=>{let m={};try{localStorage.setItem('_t','1');localStorage.removeItem('_t');return{g:k=>{try{return localStorage.getItem(k)}catch(e){return m[k]||null}},s:(k,v)=>{try{localStorage.setItem(k,v)}catch(e){m[k]=v}},d:k=>{try{localStorage.removeItem(k)}catch(e){delete m[k]}}};}catch(e){return{g:k=>m[k]||null,s:(k,v)=>{m[k]=v},d:k=>{delete m[k]}}}})();
const KEY='wc26bkt3';

// ── Flags ──
const FC={'Canada':'ca','South Africa':'za','Germany':'de','Paraguay':'py','Netherlands':'nl','Morocco':'ma','Brazil':'br','Japan':'jp','France':'fr','Sweden':'se',"C. d'Ivoire":'ci','Norway':'no','Mexico':'mx','Ecuador':'ec','England':'gb-eng','Congo DR':'cd','USA':'us','Bosnia & H.':'ba','Belgium':'be','Senegal':'sn','Portugal':'pt','Croatia':'hr','Spain':'es','Austria':'at','Switzerland':'ch','Algeria':'dz','Argentina':'ar','Cape Verde':'cv','Colombia':'co','Ghana':'gh','Australia':'au','Egypt':'eg'};
const FB={'Canada':'linear-gradient(90deg,#f00 0%,#fff 45%,#f00 100%)','South Africa':'linear-gradient(90deg,#000 0%,#007a4d 33%,#ffb612 60%,#000 100%)','Germany':'linear-gradient(90deg,#000 0%,#dd0000 50%,#ffce00 100%)','Paraguay':'linear-gradient(90deg,#d52b1e 0%,#fff 45%,#0038a8 100%)','Netherlands':'linear-gradient(90deg,#ae1c28 0%,#fff 45%,#21468b 100%)','Morocco':'linear-gradient(90deg,#c1272d 0%,#006233 100%)','Brazil':'linear-gradient(90deg,#009c3b 0%,#ffdf00 45%,#002776 100%)','Japan':'linear-gradient(90deg,#fff 0%,#bc002d 45%,#fff 100%)','France':'linear-gradient(90deg,#002395 0%,#fff 45%,#ed2939 100%)','Sweden':'linear-gradient(90deg,#006aa7 0%,#fecc02 100%)',"C. d'Ivoire":'linear-gradient(90deg,#f77f00 0%,#fff 45%,#009a44 100%)','Norway':'linear-gradient(90deg,#ef2b2d 0%,#fff 40%,#002868 100%)','Mexico':'linear-gradient(90deg,#006847 0%,#fff 40%,#ce1126 100%)','Ecuador':'linear-gradient(90deg,#ffd100 0%,#006e3c 45%,#d3212c 100%)','England':'linear-gradient(90deg,#fff 0%,#cf142b 45%,#fff 100%)','Congo DR':'linear-gradient(90deg,#007fff 0%,#cc0000 50%,#f7d44c 100%)','USA':'linear-gradient(90deg,#b22234 0%,#fff 40%,#3c3b6e 100%)','Bosnia & H.':'linear-gradient(90deg,#003087 0%,#ffcc00 100%)','Belgium':'linear-gradient(90deg,#000 0%,#ffd90c 45%,#ef3340 100%)','Senegal':'linear-gradient(90deg,#00853f 0%,#fcd116 45%,#e31b23 100%)','Portugal':'linear-gradient(90deg,#006600 0%,#ff0000 100%)','Croatia':'linear-gradient(90deg,#f00 0%,#fff 45%,#003087 100%)','Spain':'linear-gradient(90deg,#aa151b 0%,#f1bf00 45%,#aa151b 100%)','Austria':'linear-gradient(90deg,#ed2939 0%,#fff 45%,#ed2939 100%)','Switzerland':'linear-gradient(90deg,#f00,#f00)','Algeria':'linear-gradient(90deg,#006233 0%,#fff 45%,#006233 100%)','Argentina':'linear-gradient(90deg,#74acdf 0%,#fff 45%,#74acdf 100%)','Cape Verde':'linear-gradient(90deg,#003893 0%,#cf142b 100%)','Colombia':'linear-gradient(90deg,#fcd116 0%,#003087 45%,#ce1126 100%)','Ghana':'linear-gradient(90deg,#ce1126 0%,#fcd116 33%,#006b3f 66%,#000 100%)','Australia':'linear-gradient(90deg,#00008b 0%,#cc0000 50%,#fff 100%)','Egypt':'linear-gradient(90deg,#ce1126 0%,#fff 45%,#000 100%)'};

// ══════════════════════════════════════════════════════
// OFFICIAL FIFA.COM BRACKET STRUCTURE
// Source: https://www.fifa.com/en/tournaments/mens/worldcup/canadamexicousa2026/articles/knockout-stage-match-schedule-bracket
// M89=W74vW77, M90=W73vW75, M91=W76vW78, M92=W79vW80
// M93=W83vW84, M94=W81vW82, M95=W86vW88, M96=W85vW87
// QF: M97=W89vW90, M98=W93vW94 → SF M101
//     M99=W91vW92, M100=W95vW96 → SF M102
//
// LEFT SIDE visual order (top→bottom):
//   M74,M77 → R16 M89 (QF M97 → SF M101)
//   M73,M75 → R16 M90 (QF M97 → SF M101)
//   M83,M84 → R16 M93 (QF M98 → SF M101)
//   M81,M82 → R16 M94 (QF M98 → SF M101)
//
// RIGHT SIDE visual order (top→bottom):
//   M76,M78 → R16 M91 (QF M99 → SF M102)
//   M79,M80 → R16 M92 (QF M99 → SF M102)
//   M86,M88 → R16 M95 (QF M100 → SF M102)
//   M85,M87 → R16 M96 (QF M100 → SF M102)
// ══════════════════════════════════════════════════════

// L_ORD index: advance() uses Math.floor(idx/2) to find R16 slot
// idx 0,1 → R16 L slot 0 (M89); idx 2,3 → R16 L slot 1 (M90)
// idx 4,5 → R16 L slot 2 (M93); idx 6,7 → R16 L slot 3 (M94)
const L_ORD=['M74','M77','M73','M75','M83','M84','M81','M82'];
const R_ORD=['M76','M78','M79','M80','M86','M88','M85','M87'];

const R32={
  // LEFT SIDE
  M74:{t1:'Germany',     t2:'Paraguay',     d:'Jun 29',t:'4:30 PM ET', v:'Gillette Stadium',       c:'Foxborough, MA',   cap:64146,s1:null,s2:null},
  M77:{t1:'France',      t2:'Sweden',       d:'Jun 30',t:'5:00 PM ET', v:'MetLife Stadium',        c:'E. Rutherford, NJ',cap:82500,s1:null,s2:null},
  M73:{t1:'South Africa',t2:'Canada',       d:'Jun 28',t:'3:00 PM ET', v:'SoFi Stadium',           c:'Inglewood, CA',    cap:70240,s1:0,s2:1},// PLAYED ✓
  M75:{t1:'Netherlands', t2:'Morocco',      d:'Jun 29',t:'9:00 PM ET', v:'Estadio BBVA',           c:'Monterrey, MX',    cap:53500,s1:null,s2:null},
  M83:{t1:'Portugal',    t2:'Croatia',      d:'Jul 2', t:'7:00 PM ET', v:'BMO Field',              c:'Toronto, CA',      cap:45000,s1:null,s2:null},
  M84:{t1:'Spain',       t2:'Austria',      d:'Jul 2', t:'3:00 PM ET', v:'SoFi Stadium',           c:'Inglewood, CA',    cap:70240,s1:null,s2:null},
  M81:{t1:'USA',         t2:'Bosnia & H.',  d:'Jul 1', t:'8:00 PM ET', v:"Levi's Stadium",         c:'Santa Clara, CA',  cap:68500,s1:null,s2:null},
  M82:{t1:'Belgium',     t2:'Senegal',      d:'Jul 1', t:'4:00 PM ET', v:'Lumen Field',            c:'Seattle, WA',      cap:69000,s1:null,s2:null},
  // RIGHT SIDE
  M76:{t1:'Brazil',      t2:'Japan',        d:'Jun 29',t:'1:00 PM ET', v:'NRG Stadium',            c:'Houston, TX',      cap:68777,s1:null,s2:null},
  M78:{t1:"C. d'Ivoire", t2:'Norway',       d:'Jun 30',t:'1:00 PM ET', v:'AT&T Stadium',           c:'Arlington, TX',    cap:94000,s1:null,s2:null},
  M79:{t1:'Mexico',      t2:'Ecuador',      d:'Jun 30',t:'9:00 PM ET', v:'Estadio Azteca',         c:'Mexico City, MX',  cap:87500,s1:null,s2:null},
  M80:{t1:'England',     t2:'Congo DR',     d:'Jul 1', t:'12:00 PM ET',v:'Mercedes-Benz Stadium',  c:'Atlanta, GA',      cap:68239,s1:null,s2:null},
  M86:{t1:'Argentina',   t2:'Cape Verde',   d:'Jul 3', t:'6:00 PM ET', v:'Hard Rock Stadium',      c:'Miami Gardens, FL',cap:65326,s1:null,s2:null},
  M88:{t1:'Australia',   t2:'Egypt',        d:'Jul 3', t:'2:00 PM ET', v:'AT&T Stadium',           c:'Arlington, TX',    cap:94000,s1:null,s2:null},
  M85:{t1:'Switzerland', t2:'Algeria',      d:'Jul 2', t:'11:00 PM ET',v:'BC Place',               c:'Vancouver, CA',    cap:54000,s1:null,s2:null},
  M87:{t1:'Colombia',    t2:'Ghana',        d:'Jul 3', t:'9:30 PM ET', v:'Arrowhead Stadium',      c:'Kansas City, MO',  cap:69045,s1:null,s2:null},
};

// ── State ──
let G={slots:{},scores:{}};let US=[],UT=null;
function sk(r,s,i){return`${r}_${s}_${i}`}
function ss(r,s,i,d){const k=sk(r,s,i);G.slots[k]={...(G.slots[k]||{}),...d}}
function gs(r,s,i){return G.slots[sk(r,s,i)]||{t1:'',t2:''}}
function save(){ST.s(KEY,JSON.stringify(G))}
function doSave(){save();const b=document.querySelector('.btng');b.textContent='✓ Guardado';setTimeout(()=>b.textContent='💾 Save',1800)}
function doReset(){if(!confirm('¿Resetear?'))return;ST.d(KEY);G={slots:{},scores:{}};US=[];boot();render();updateChamps();document.getElementById('cp').style.display='none'}
function pushU(msg,fn){US.push({msg,fn});if(US.length>40)US.shift();document.getElementById('um').textContent=msg;document.getElementById('ub').classList.add('on');if(UT)clearTimeout(UT);UT=setTimeout(()=>document.getElementById('ub').classList.remove('on'),5000)}
function doUndo(){if(!US.length)return;US.pop().fn();save();render();updateChamps();document.getElementById('ub').classList.remove('on')}

// ── Match result ──
function res(mk,t1,t2){
  if(!t1||!t2)return{d:false};
  const sc=G.scores[mk]||{};const s1=sc.t1,s2=sc.t2;
  if(s1==null||s1===''||s2==null||s2==='')return{d:false};
  const n1=+s1,n2=+s2;if(isNaN(n1)||isNaN(n2))return{d:false};
  if(n1>n2)return{d:true,w:t1,l:t2,sc:`${n1}–${n2}`};
  if(n2>n1)return{d:true,w:t2,l:t1,sc:`${n2}–${n1}`};
  const p1=sc.t1p,p2=sc.t2p;
  if(!p1||!p2)return{d:false,tie:true,sc:`${n1}–${n2}`};
  const np1=+p1,np2=+p2;if(isNaN(np1)||isNaN(np2))return{d:false,tie:true};
  if(np1>np2)return{d:true,w:t1,l:t2,sc:`${n1}–${n2}`,pen:`${np1}–${np2}`};
  if(np2>np1)return{d:true,w:t2,l:t1,sc:`${n1}–${n2}`,pen:`${np2}–${np1}`};
  return{d:false,tie:true};
}

// ── Advance winner ──
function advance(mk,winner,loser){
  if(!winner)return;
  const li=L_ORD.indexOf(mk),ri=R_ORD.indexOf(mk);
  if(li>=0){// R32 left
    const r16i=Math.floor(li/2),slot=li%2===0?'t1':'t2';
    ss('r16','L',r16i,{[slot]:winner});
  } else if(ri>=0){// R32 right
    const r16i=Math.floor(ri/2),slot=ri%2===0?'t1':'t2';
    ss('r16','R',r16i,{[slot]:winner});
  } else {// KO rounds
    const p=mk.split('_');if(p.length<3)return;
    const r=p[0],s=p[1],i=+p[2];
    if(r==='r16'){const qi=Math.floor(i/2),qs=i%2===0?'t1':'t2';ss('qf',s,qi,{[qs]:winner});}
    else if(r==='qf'){ss('sf',s,0,{[i===0?'t1':'t2']:winner});}
    else if(r==='sf'){
      ss('fin','C',0,{[s==='L'?'t1':'t2']:winner});
      if(loser)ss('3rd','C',0,{[s==='L'?'t1':'t2']:loser});
    }
  }
}

function setScore(mk,sk2,v){
  if(!G.scores[mk])G.scores[mk]={};G.scores[mk][sk2]=v;save();
  let t1='',t2='';
  const ALL=[...L_ORD,...R_ORD],ai=ALL.indexOf(mk);
  if(ai>=0){const m=R32[mk];const side=ai<8?'L':'R';const i=ai<8?ai:ai-8;const sl=gs('r32',side,i);t1=sl.t1||m.t1;t2=sl.t2||m.t2;}
  else{const p=mk.split('_');if(p.length>=3){const sl=gs(p[0],p[1],+p[2]);t1=sl.t1;t2=sl.t2;}}
  const r=res(mk,t1,t2);
  const el=document.getElementById('mts_'+mk);const mc=document.getElementById('mc_'+mk);
  if(el)el.classList.toggle('sp',!!r.tie);if(mc)mc.classList.toggle('hp',!!r.tie);
  if(r.d){advance(mk,r.w,r.l);requestAnimationFrame(render);}
  updateChamps();updateStats();
}

// ── Drag ──
let dT=null;
function dS(e,t){if(!t){e.preventDefault();return}dT=t;e.dataTransfer.effectAllowed='copy';e.dataTransfer.setData('text',t);setTimeout(()=>document.querySelectorAll('[data-t="'+t+'"]').forEach(el=>el.classList.add('ds')),0)}
function dE(){document.querySelectorAll('.ds').forEach(el=>el.classList.remove('ds'))}
function dO(e){e.preventDefault();e.currentTarget.classList.add('dov')}
function dL(e){e.currentTarget.classList.remove('dov')}
function dDrop(e,r,s,i,slot){
  e.preventDefault();e.currentTarget.classList.remove('dov');
  const team=e.dataTransfer.getData('text')||dT;if(!team)return;
  const snap=JSON.parse(JSON.stringify(G.slots));pushU('Colocaste '+team,()=>{G.slots=snap;render()});
  ss(r,s,i,{[slot==='1'?'t1':'t2']:team});save();render();
}
function clrS(r,s,i,slot){
  const sl=gs(r,s,i);const rem=slot==='1'?sl.t1:sl.t2;if(!rem)return;
  const snap=JSON.parse(JSON.stringify(G.slots));pushU('Quitaste '+rem,()=>{G.slots=snap;render()});
  ss(r,s,i,{[slot==='1'?'t1':'t2']:''});save();render();
}
function advW(r,s,i,team){
  if(!team)return;const sl=gs(r,s,i);const loser=team===sl.t1?sl.t2:sl.t1;
  const snap=JSON.parse(JSON.stringify(G.slots));pushU('Avanzaste '+team,()=>{G.slots=snap;render();updateChamps()});
  advance(sk(r,s,i),team,loser);save();render();updateChamps();
}

// ── Render ──
function rRow(r,s,i,slot,team,mk){
  const has=!!team,sv=(G.scores[mk]||{})[`t${slot}`]??'',pv=(G.scores[mk]||{})[`t${slot}p`]??'';
  let rs='',ov='';
  if(has&&FC[team])rs=`background-image:url('https://flagcdn.com/w320/${FC[team]}.png');background-size:100% 100%;position:relative;`;
  else if(has&&FB[team])rs=`background:${FB[team]};position:relative;`;
  if(has&&FC[team])ov=`<div style="position:absolute;inset:0;background:rgba(0,0,0,.35);pointer-events:none;z-index:0"></div>`;
  return`<div class="tr" style="${rs}" ondragover="dO(event)" ondragleave="dL(event)" ondrop="dDrop(event,'${r}','${s}',${i},'${slot}')">
    ${ov}<div class="gs" style="background:${has?'rgba(255,255,255,.6)':'rgba(180,195,210,.3)'};z-index:1;position:relative"></div>
    <button class="wb" onclick="advW('${r}','${s}',${i},'${team||''}')" ${!has?'disabled':''} style="position:relative;z-index:1">⊙</button>
    <div class="tn ${has?'ht':'em'}" data-t="${team||''}" draggable="${has}" ondragstart="dS(event,'${team||''}')" ondragend="dE()" style="position:relative;z-index:1">${has?team:'TBD'}</div>
    <button class="cb ${has?'vs':''}" onclick="clrS('${r}','${s}',${i},'${slot}')" style="position:relative;z-index:1">✕</button>
    <div class="sb">
      <input class="si" type="number" min="0" max="30" value="${sv}" placeholder="–" onchange="setScore('${mk}','t${slot}',this.value)" onclick="this.select()" inputmode="numeric"/>
      <span class="pp">(</span><input class="si pi" type="number" min="0" max="30" value="${pv}" placeholder="–" onchange="setScore('${mk}','t${slot}p',this.value)" onclick="this.select()" inputmode="numeric"/><span class="pp">)</span>
    </div></div>`;
}
function rM32(mid,ordIdx,side){
  const m=R32[mid],sl=gs('r32',side,ordIdx);
  const t1=sl.t1||m.t1,t2=sl.t2||m.t2,mk=mid;
  const rv=res(mk,t1,t2),sp2=!!rv.tie||(G.scores[mk]&&(G.scores[mk].t1p||G.scores[mk].t2p));
  return`<div class="mw"><div class="mc ${sp2?'hp':''}" id="mc_${mk}">
    <div class="mm"><span class="mdt">${m.d}<span class="mte"> ${m.t} ET</span></span><span class="mid">${mid}</span></div>
    <div class="mts ${sp2?'sp':''}" id="mts_${mk}">${rRow('r32',side,ordIdx,'1',t1,mk)}${rRow('r32',side,ordIdx,'2',t2,mk)}</div>
    <div class="vn"><strong>${m.v}</strong> · ${m.c} · ${(m.cap/1000).toFixed(0)}K</div>
  </div></div>`;
}
function rKO(r,s,i,cls=''){
  const mk=sk(r,s,i),sl=gs(r,s,i),t1=sl.t1||'',t2=sl.t2||'';
  const rv=res(mk,t1,t2),sp2=!!rv.tie||(G.scores[mk]&&(G.scores[mk].t1p||G.scores[mk].t2p));
  return`<div class="mw"><div class="mc ${cls} ${sp2?'hp':''}" id="mc_${mk}">
    <div style="height:4px"></div>
    <div class="mts ${sp2?'sp':''}" id="mts_${mk}">${rRow(r,s,i,'1',t1,mk)}${rRow(r,s,i,'2',t2,mk)}</div>
  </div></div>`;
}

const MH=190;
function sp(h){return`<div style="height:${h}px"></div>`}

function render(){
  const ml=document.getElementById('ml'),FT=Math.round(MH*3.5-MH/2),cg=`<div class="cg"></div>`;
  let lR32='';L_ORD.forEach((mid,i)=>lR32+=rM32(mid,i,'L'));
  let rR32='';R_ORD.forEach((mid,i)=>rR32+=rM32(mid,i,'R'));
  function bR16(s){let h=sp(MH/2);for(let i=0;i<4;i++){h+=rKO('r16',s,i);if(i<3)h+=sp(MH)}return h}
  function bQF(s){return sp(MH*1.5+MH/2)+rKO('qf',s,0)+sp(MH*3)+rKO('qf',s,1)}
  function bSF(s){return sp(MH*3.5-MH/2)+rKO('sf',s,0)}
  ml.innerHTML=
    `<div class="rc r32"><div class="rl">Round of 32</div>${lR32}</div>`+cg+
    `<div class="rc r16"><div class="rl">Round of 16</div>${bR16('L')}</div>`+cg+
    `<div class="rc qf"><div class="rl">Cuartos</div>${bQF('L')}</div>`+cg+
    `<div class="rc sf"><div class="rl">Semifinal</div>${bSF('L')}</div>`+cg+
    `<div class="cc"><div class="rl gold">🏆 Final · Jul 19</div>${sp(FT)}${rKO('fin','C',0,'fin')}<div class="tlbl">🥉 3er Lugar · Jul 18</div>${rKO('3rd','C',0,'trd')}</div>`+cg+
    `<div class="rc sf"><div class="rl">Semifinal</div>${bSF('R')}</div>`+cg+
    `<div class="rc qf"><div class="rl">Cuartos</div>${bQF('R')}</div>`+cg+
    `<div class="rc r16"><div class="rl">Round of 16</div>${bR16('R')}</div>`+cg+
    `<div class="rc r32"><div class="rl">Round of 32</div>${rR32}</div>`;
  requestAnimationFrame(()=>requestAnimationFrame(drawSVG));
}

// ── SVG Connectors ──
function gR(id){
  const el=document.getElementById('mts_'+id);if(!el)return null;
  const bw=document.getElementById('bw');
  const bwr=bw.getBoundingClientRect();
  const er=el.getBoundingClientRect();
  // Divide by CZ to get unscaled coordinates within #bw
  return{
    l:(er.left-bwr.left)/CZ,
    r:(er.right-bwr.left)/CZ,
    m:((er.top+er.bottom)/2-bwr.top)/CZ
  };
}
function drawSVG(){
  const svg=document.getElementById('sv');
  const bw=document.getElementById('bw');
  if(!svg||!bw)return;
  // Use unscaled dimensions for SVG so paths are correct
  const W=bw.scrollWidth,H=bw.scrollHeight;
  svg.setAttribute('width',W);svg.setAttribute('height',H);
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.innerHTML='';
  function p(d,c,dash){const e=document.createElementNS('http://www.w3.org/2000/svg','path');e.setAttribute('d',d);e.setAttribute('stroke',c||'#4472c4');e.setAttribute('stroke-width','2');e.setAttribute('fill','none');e.setAttribute('opacity','.4');if(dash)e.setAttribute('stroke-dasharray',dash);svg.appendChild(e)}
  function cL(id1,id2,rid){const a=gR(id1),b=gR(id2),c=gR(rid);if(!a||!b||!c)return;const mx=(a.r+c.l)/2;p(`M${a.r+1} ${a.m} H${mx} V${b.m} M${a.r+1} ${b.m} H${mx} M${mx} ${a.m} V${c.m} H${c.l-1}`)}
  function cR(id1,id2,rid){const a=gR(id1),b=gR(id2),c=gR(rid);if(!a||!b||!c)return;const mx=(a.l+c.r)/2;p(`M${a.l-1} ${a.m} H${mx} V${b.m} M${a.l-1} ${b.m} H${mx} M${mx} ${a.m} V${c.m} H${c.r+1}`)}
  // R32 → R16 (using L_ORD pairs)
  cL('M74','M77',sk('r16','L',0));cL('M73','M75',sk('r16','L',1));
  cL('M83','M84',sk('r16','L',2));cL('M81','M82',sk('r16','L',3));
  cR('M76','M78',sk('r16','R',0));cR('M79','M80',sk('r16','R',1));
  cR('M86','M88',sk('r16','R',2));cR('M85','M87',sk('r16','R',3));
  // R16 → QF
  cL(sk('r16','L',0),sk('r16','L',1),sk('qf','L',0));cL(sk('r16','L',2),sk('r16','L',3),sk('qf','L',1));
  cR(sk('r16','R',0),sk('r16','R',1),sk('qf','R',0));cR(sk('r16','R',2),sk('r16','R',3),sk('qf','R',1));
  // QF → SF
  cL(sk('qf','L',0),sk('qf','L',1),sk('sf','L',0));cR(sk('qf','R',0),sk('qf','R',1),sk('sf','R',0));
  // SF → Final
  const sfl=gR(sk('sf','L',0)),sfr=gR(sk('sf','R',0)),fin=gR(sk('fin','C',0)),trd=gR(sk('3rd','C',0));
  if(sfl&&fin){const mx=(sfl.r+fin.l)/2;p(`M${sfl.r+1} ${sfl.m} H${mx} V${fin.m} H${fin.l-1}`)}
  if(sfr&&fin){const mx=(sfr.l+fin.r)/2;p(`M${sfr.l-1} ${sfr.m} H${mx} V${fin.m} H${fin.r+1}`)}
  if(sfl&&trd)p(`M${sfl.r+1} ${sfl.m} H${(sfl.r+trd.l)/2} V${trd.m} H${trd.l-1}`,'#a0522d','5,4');
  if(sfr&&trd)p(`M${sfr.l-1} ${sfr.m} H${(sfr.l+trd.r)/2} V${trd.m} H${trd.r+1}`,'#a0522d','5,4');
}
window.addEventListener('resize',()=>requestAnimationFrame(drawSVG));

// ── Champions ──
function updateChamps(){
  const panel=document.getElementById('cp'),fin=gs('fin','C',0),thd=gs('3rd','C',0);
  if(!fin.t1&&!fin.t2&&!thd.t1&&!thd.t2){panel.style.display='none';return}
  panel.style.display='flex';
  const fR=res(sk('fin','C',0),fin.t1,fin.t2),tR=res(sk('3rd','C',0),thd.t1,thd.t2);
  const fs=r=>r.pen?`${r.sc} (pen. ${r.pen})`:r.sc||'';
  const box=(emo,lbl,name,note='')=>{
    if(!name)return'';const code=FC[name];
    const bg=code?`background-image:url('https://flagcdn.com/w320/${code}.png');background-size:100% 100%;`:(FB[name]?`background:${FB[name]};`:'background:#eef1f6;');
    return`<div class="cbox" style="${bg}border-color:rgba(255,255,255,.4)">${code?'<div class="cov"></div>':''}<div class="cct"><span class="cem">${emo}</span><div><div class="clb">${lbl}${note?' · '+note:''}</div><div class="cnm">${name}</div></div></div></div>`;
  };
  let h='';
  if(fR.d){h+=box('🏆','Campeón',fR.w,fs(fR));h+=box('🥈','Subcampeón',fR.l)}
  else if(fR.tie){if(fin.t1)h+=box('⚽','Final (pen.)',fin.t1,fs(fR));if(fin.t2)h+=box('⚽','Final (pen.)',fin.t2)}
  else{if(fin.t1)h+=box('🥇','Finalista',fin.t1);if(fin.t2)h+=box('🥇','Finalista',fin.t2)}
  if(tR.d){h+=box('🥉','3er Lugar',tR.w,fs(tR));h+=box('4️⃣','4to Lugar',tR.l)}
  else{if(thd.t1)h+=box('🥉','Disputa 3er',thd.t1);if(thd.t2)h+=box('🥉','Disputa 3er',thd.t2)}
  panel.innerHTML=h;
}
function updateStats(){
  let played=0,goals=0;Object.values(G.scores).forEach(sc=>{if(sc.t1!=null&&sc.t1!==''&&sc.t2!=null&&sc.t2!==''){played++;goals+=(+sc.t1)+(+sc.t2)}});
  const avg=played>0?(goals/played).toFixed(2):'0.00';
  const el=document.getElementById('hs');if(el)el.innerHTML=`<span>⚽ <strong>${played}</strong>/32</span><span>🎯 <strong>${goals}</strong> goles</span><span>📊 <strong>${avg}</strong>/partido</span>`;
}

// ── Cascade ──
function cascade(){
  [...L_ORD,...R_ORD].forEach((mid,ai)=>{
    const side=ai<8?'L':'R',i=ai<8?ai:ai-8,m=R32[mid],sl=gs('r32',side,i);
    const r=res(mid,sl.t1||m.t1,sl.t2||m.t2);if(r.d)advance(mid,r.w,r.l);
  });
  ['L','R'].forEach(s=>[0,1,2,3].forEach(i=>{const mk=sk('r16',s,i),sl=gs('r16',s,i);const r=res(mk,sl.t1,sl.t2);if(r.d)advance(mk,r.w,r.l)}));
  ['L','R'].forEach(s=>[0,1].forEach(i=>{const mk=sk('qf',s,i),sl=gs('qf',s,i);const r=res(mk,sl.t1,sl.t2);if(r.d)advance(mk,r.w,r.l)}));
  ['L','R'].forEach(s=>{const mk=sk('sf',s,0),sl=gs('sf',s,0);const r=res(mk,sl.t1,sl.t2);if(r.d)advance(mk,r.w,r.l)});
}

// ── Boot ──
function boot(){
  L_ORD.forEach((mid,i)=>{if(!G.slots[sk('r32','L',i)])ss('r32','L',i,{t1:R32[mid].t1,t2:R32[mid].t2})});
  R_ORD.forEach((mid,i)=>{if(!G.slots[sk('r32','R',i)])ss('r32','R',i,{t1:R32[mid].t1,t2:R32[mid].t2})});
  [...L_ORD,...R_ORD].forEach(mid=>{const m=R32[mid];if(m.s1!==null&&!G.scores[mid])G.scores[mid]={t1:m.s1,t2:m.s2}});
  ['r16','qf','sf'].forEach(r=>['L','R'].forEach(s=>{const c={r16:4,qf:2,sf:1}[r];for(let i=0;i<c;i++){if(!G.slots[sk(r,s,i)])ss(r,s,i,{t1:'',t2:''})}}));
  if(!G.slots['fin_C_0'])ss('fin','C',0,{t1:'',t2:''});if(!G.slots['3rd_C_0'])ss('3rd','C',0,{t1:'',t2:''});
  cascade();
}

// ── iOS touch drag ──
(function(){let tD=null,tC=null,tT=null;
document.addEventListener('touchstart',e=>{const s=e.target.closest('.tn.ht');if(!s)return;tD=s.dataset.t;tC=s.cloneNode(true);tC.style.cssText='position:fixed;z-index:9999;opacity:.85;pointer-events:none;background:rgba(26,44,94,.9);color:#fff;padding:6px 12px;border-radius:6px;font-size:14px;font-weight:900;white-space:nowrap;';document.body.appendChild(tC)},{passive:true});
document.addEventListener('touchmove',e=>{if(!tD||!tC)return;const t=e.touches[0];tC.style.left=(t.clientX-40)+'px';tC.style.top=(t.clientY-20)+'px';tC.style.display='none';const dr=document.elementFromPoint(t.clientX,t.clientY);tC.style.display='';document.querySelectorAll('.dov').forEach(el=>el.classList.remove('dov'));if(dr){const d=dr.closest('[ondrop]');if(d){d.classList.add('dov');tT=d}}},{passive:true});
document.addEventListener('touchend',e=>{if(!tD)return;if(tC){tC.remove();tC=null}document.querySelectorAll('.dov').forEach(el=>el.classList.remove('dov'));if(tT){const a=tT.getAttribute('ondrop');if(a){const m=a.match(/dDrop\(event,'([^']+)','([^']+)',(\d+),'([^']+)'\)/);if(m){const[,r,s,i,slot]=m;const snap=JSON.parse(JSON.stringify(G.slots));pushU('Colocaste '+tD,()=>{G.slots=snap;render()});ss(r,s,+i,{[slot==='1'?'t1':'t2']:tD});save();render();}}}tD=null;tT=null;},{passive:true});
})();

// ── Zoom controls ──
let CZ=1;
const BRACKET_W=1380;
function applyZoom(z){
  CZ=Math.min(3,Math.max(0.1,+z.toFixed(2)));
  const bw=document.getElementById('bw');
  bw.style.transform=`scale(${CZ})`;
  // Expand the .bo container so scrollbars work correctly
  const bo=document.querySelector('.bo');
  bo.style.width=(BRACKET_W*CZ+40)+'px';
  bo.style.height=(bw.scrollHeight*CZ+60)+'px';
  requestAnimationFrame(drawSVG);
}
function zIn(){applyZoom(CZ+0.1)}
function zOut(){applyZoom(CZ-0.1)}
function zFit(){
  const sw=window.innerWidth-32;
  applyZoom(sw/BRACKET_W);
}
function zReset(){applyZoom(1)}

const sv=ST.g(KEY);if(sv){try{G=JSON.parse(sv)}catch(e){G={slots:{},scores:{}}}}
if(!G.scores)G.scores={};
boot();render();updateStats();
// On mobile: start zoomed to fit full bracket
requestAnimationFrame(()=>{if(window.innerWidth<1400)zFit()});
window.addEventListener('resize',()=>{if(window.innerWidth<1400)zFit()});
</script>
